<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KING STORE | متجر الملوك الفاخر</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/crown.png" />
    <style>
      #global-loader {
        position: fixed;
        inset: 0;
        background: #020617;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease-out;
      }
      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        text-align: center;
      }
      .loader-content h1 {
        color: #f59e0b;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 900;
        letter-spacing: 6px;
        margin: 0;
        font-size: 30px;
        text-transform: uppercase;
        text-shadow: 0 2px 10px rgba(245, 158, 11, 0.2);
      }
      .loader-content p {
        color: rgba(245, 158, 11, 0.6);
        font-family: monospace;
        font-size: 11px;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin: 0;
        font-weight: bold;
      }
      .pulse-crown {
        animation: pulse 2s infinite ease-in-out;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; transform: scale(0.95); }
        50% { opacity: 1; transform: scale(1.05); }
      }
    </style>
  </head>
  <body>
    <div id="global-loader">
      <div class="loader-content">
        <div class="pulse-crown">
          <svg viewBox="0 0 24 24" width="80" height="80" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z"/>
            <path d="M3 20h18"/>
          </svg>
        </div>
        <h1>KING STORE</h1>
        <p>THE ROYAL EXPERIENCE</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
