<!doctype html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KING STORE | متجر الملوك الفاخر</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/crown.png" />
    <style>
      #global-loader {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, #0b1530 0%, #020617 100%);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        overflow: hidden;
      }
      #global-loader::before {
        content: '';
        position: absolute;
        width: 150%;
        height: 150%;
        background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 60%);
        top: -25%;
        left: -25%;
        pointer-events: none;
      }
      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        text-align: center;
        position: relative;
        z-index: 10;
      }
      .crown-container {
        position: relative;
        width: 120px;
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pulse-glow {
        position: absolute;
        width: 80px;
        height: 80px;
        background: rgba(245, 158, 11, 0.15);
        border-radius: 50%;
        filter: blur(20px);
        animation: glowPulse 2s infinite ease-in-out;
      }
      .pulse-crown {
        position: relative;
        z-index: 2;
        animation: crownFloat 3s infinite ease-in-out;
      }
      .loading-ring {
        position: absolute;
        width: 100px;
        height: 100px;
        border: 2px solid transparent;
        border-top-color: #f59e0b;
        border-bottom-color: rgba(245, 158, 11, 0.2);
        border-radius: 50%;
        animation: spinRing 2s linear infinite;
      }
      .loader-content h1 {
        color: #f59e0b;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 900;
        letter-spacing: 8px;
        margin: 0;
        font-size: 32px;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
        margin-right: -8px; /* Offset the letter-spacing on the last letter for perfect centering */
      }
      .loader-content p {
        color: rgba(245, 158, 11, 0.85);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        letter-spacing: 1px;
        margin: 0;
        font-weight: 600;
      }
      .loader-content .subtitle-ar {
        color: rgba(255, 255, 255, 0.45);
        font-size: 11px;
        letter-spacing: 0px;
        margin-top: -8px;
        font-weight: 500;
      }
      .progress-dots {
        display: flex;
        gap: 6px;
        margin-top: 8px;
      }
      .dot {
        width: 6px;
        height: 6px;
        background-color: #f59e0b;
        border-radius: 50%;
        opacity: 0.3;
        animation: dotBounce 1.4s infinite ease-in-out both;
      }
      .dot:nth-child(1) { animation-delay: -0.32s; }
      .dot:nth-child(2) { animation-delay: -0.16s; }

      @keyframes glowPulse {
        0%, 100% { transform: scale(0.85); opacity: 0.12; }
        50% { transform: scale(1.15); opacity: 0.25; }
      }
      @keyframes crownFloat {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-8px) scale(1.03); }
      }
      @keyframes spinRing {
        to { transform: rotate(360deg); }
      }
      @keyframes dotBounce {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="global-loader">
      <div class="loader-content">
        <div class="crown-container">
          <div class="pulse-glow"></div>
          <div class="loading-ring"></div>
          <div class="pulse-crown">
            <svg viewBox="0 0 24 24" width="60" height="60" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 10px rgba(245,158,11,0.5));">
              <path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z"/>
              <path d="M3 20h18"/>
            </svg>
          </div>
        </div>
        <h1>KING STORE</h1>
        <p>THE ROYAL EXPERIENCE</p>
        <span class="subtitle-ar">جاري تحميل تجربة متجر الملوك الفاخر...</span>
        <div class="progress-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      (function() {
        var loader = document.getElementById('global-loader');
        if (!loader) return;

        var isDismissed = false;
        function dismissLoader() {
          if (isDismissed) return;
          isDismissed = true;
          loader.style.opacity = '0';
          setTimeout(function() {
            loader.style.display = 'none';
            if (loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
          }, 600);
        }

        // 1. Force dismiss after 1500ms as an absolute safety fallback
        var safetyTimeout = setTimeout(function() {
          console.log("[PWA Failsafe] Forcing loader dismiss after 1.5 seconds.");
          dismissLoader();
        }, 1500);

        // 2. Listen for service worker ready or custom app events
        window.addEventListener('sw-ready', function() {
          console.log("[PWA Loader] Service Worker signaled readiness.");
          dismissLoader();
        });

        window.addEventListener('app-ready', function() {
          console.log("[PWA Loader] React App signaled readiness.");
          dismissLoader();
        });

        // 3. Listen to service worker active broadcast
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'SW_ACTIVATED') {
              console.log("[PWA Loader] Service Worker activated signal received via message.");
              dismissLoader();
            }
          });

          // Check if controller is already present
          if (navigator.serviceWorker.controller) {
            console.log("[PWA Loader] Service Worker already active on load.");
            setTimeout(dismissLoader, 300);
          }
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
